spring:
  application:
    name: pitsafety
  datasource:
    url: jdbc:h2:mem:pit_safety_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

deepseek:
  api-key: ${DEEPSEEK_API_KEY:your-api-key-here}
  base-url: https://api.deepseek.com
  model:
    chat: deepseek-chat
    reasoner: deepseek-reasoner
